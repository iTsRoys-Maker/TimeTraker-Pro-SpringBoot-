kind = "web"
previewPath = "/"
title = "TimeTrack Pro"
version = "1.0.0"
id = "artifacts/timetrack-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24529

[services.development]
run = "pnpm --filter @workspace/timetrack-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/timetrack-pro", "run", "build" ]
publicDir = "artifacts/timetrack-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24529"
BASE_PATH = "/"
