server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: timetrack-api-server
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:timetrack}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-long-random-string-of-at-least-32-bytes}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:5173}

logging:
  level:
    com.timetrack: DEBUG
    org.springframework.security: INFO
