services:
  db:
    image: postgres:16-alpine
    container_name: timetraker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timetrack
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timetrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timetraker-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: timetrack
      PGUSER: postgres
      PGPASSWORD: postgres
      JWT_SECRET: super-secret-key-change-this-very-long-key-123456789
      CORS_ALLOWED_ORIGINS: http://localhost
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timetraker-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data: