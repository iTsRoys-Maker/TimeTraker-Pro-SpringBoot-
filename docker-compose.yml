services:
  db:
    image: postgres:16-alpine
    container_name: timetraker-db
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-timetrack}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-timetrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timetraker-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-timetrack}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-please-change-me-to-a-long-random-string-at-least-32-bytes}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timetraker-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
